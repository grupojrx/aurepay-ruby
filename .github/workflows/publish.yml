# RubyGems Trusted Publisher (OIDC): org=grupojrx, repo=aurepay-ruby, workflow=publish.yml
# Só publica se o SDK mudou vs latest no RubyGems.
name: Publish RubyGems

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Should publish?
        id: decide
        run: |
          set +e
          node scripts/should-publish.mjs
          code=$?
          set -e
          if [ "$code" -eq 10 ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$code" -ne 0 ]; then
            exit "$code"
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Setup Ruby
        if: steps.decide.outputs.publish == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Build gem
        if: steps.decide.outputs.publish == 'true'
        run: gem build aurepay.gemspec

      - name: Configure RubyGems credentials (OIDC Trusted Publisher)
        if: steps.decide.outputs.publish == 'true'
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Publish to RubyGems
        if: steps.decide.outputs.publish == 'true'
        run: gem push aurepay-*.gem

      - name: Skipped
        if: steps.decide.outputs.publish != 'true'
        run: echo "Nenhuma alteração no SDK Ruby — publish ignorado."
